<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪄 Prompt Set Editor - A1111 批次套圖工具</title>
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <!-- SortableJS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  
  <style>
    :root {
      --bg-color: #09090b;
      --panel-bg: #18181b;
      --card-bg: #222227;
      --card-border: #334155;
      --input-bg: #0f172a;
      --input-border: #1e293b;
      --text-color: #f1f5f9;
      --text-muted: #94a3b8;
      
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --primary-glow: rgba(99, 102, 241, 0.15);
      
      --emerald: #10b981;
      --emerald-glow: rgba(16, 185, 129, 0.15);
      
      --rose: #ef4444;
      --rose-hover: #dc2626;
      
      --font-title: 'Outfit', 'Inter', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
        radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.05) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text-color);
      font-family: var(--font-body);
      min-height: 100vh;
      padding-top: 80px;
      padding-bottom: 60px;
    }

    /* Glassmorphism Navigation */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: rgba(9, 9, 11, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      background: linear-gradient(135deg, var(--primary), #a855f7);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .logo-text {
      font-family: var(--font-title);
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .api-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      display: inline-block;
      margin-left: 6px;
      transition: background 0.2s;
    }
    .api-status-dot.online {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1e1e24;
      border: 1px solid #3f3f46;
      color: #cbd5e1;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn:hover {
      background: #27272a;
      border-color: #52525b;
      color: #fff;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #4f46e5);
      border: none;
      color: white;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #4f46e5, #4338ca);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.3);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .btn-danger:hover {
      background: var(--rose);
      border-color: var(--rose);
      color: white;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* Workspace Control Panel */
    .control-panel {
      background: rgba(24, 24, 27, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .control-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 130px;
    }

    .pills-container {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill-btn {
      background: #18181b;
      border: 1px solid #27272a;
      color: #a1a1aa;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .pill-btn:hover {
      background: #27272a;
      color: #fff;
    }

    .pill-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 2px 8px var(--primary-glow);
    }

    .pill-btn.compare-active {
      background: var(--emerald);
      border-color: var(--emerald);
      color: white;
      box-shadow: 0 2px 8px var(--emerald-glow);
    }

    /* Locked Common Prompt Container */
    .common-prompt-container {
      background: rgba(99, 102, 241, 0.02);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.03);
    }

    .common-prompt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .common-prompt-title {
      font-family: var(--font-title);
      font-size: 1.1rem;
      font-weight: 700;
      color: #a5b4fc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Prompt Cards Layout */
    .prompt-cards-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .prompt-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 24px;
      transition: box-shadow 0.2s, border-color 0.2s;
      position: relative;
    }

    .prompt-card:hover {
      border-color: #3f3f46;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    }

    .prompt-card.card-collapsed .categories-grid {
      display: none;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #27272a;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .prompt-card.card-collapsed .card-header {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    .card-title-area {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-grow: 1;
    }

    .card-drag-handle {
      color: #4b5563;
      cursor: grab;
      padding: 4px;
      border-radius: 4px;
    }

    .card-drag-handle:hover {
      background: #27272a;
      color: #9ca3af;
    }

    .card-name-input {
      background: transparent;
      border: none;
      color: #f1f5f9;
      font-family: var(--font-title);
      font-size: 1.05rem;
      font-weight: 600;
      outline: none;
      border-bottom: 1px dashed transparent;
      padding: 2px 4px;
      transition: border-color 0.2s;
      width: 240px;
    }

    .card-name-input:focus {
      border-color: var(--primary);
    }

    .card-compiled-preview {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
      margin-left: 16px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    /* Grid of Category Inputs */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .category-box {
      background: #0f0f12;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.2s ease;
    }

    .category-box.collapsed {
      opacity: 0.6;
    }

    .category-box-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .category-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .category-box.compare-highlight {
      border-color: rgba(16, 185, 129, 0.4);
      background: rgba(16, 185, 129, 0.02);
    }

    .category-box.compare-highlight .category-label {
      color: #34d399;
    }

    .btn-icon-sm {
      background: none;
      border: none;
      color: #4b5563;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      border-radius: 4px;
    }

    .btn-icon-sm:hover {
      background: #27272a;
      color: white;
    }

    .spinner-icon {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .category-textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 0.85rem;
      font-family: var(--font-body);
      line-height: 1.4;
      resize: vertical;
      min-height: 48px;
      height: 48px;
      padding: 0;
      transition: height 0.2s, opacity 0.2s;
    }

    .category-box.collapsed .category-textarea {
      height: 0px !important;
      min-height: 0px !important;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      width: 90%;
      max-width: 800px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid #27272a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-family: var(--font-title);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex-grow: 1;
    }

    .modal-textarea {
      width: 100%;
      height: 350px;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #e2e8f0;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 12px;
      outline: none;
      resize: none;
    }

    .modal-footer {
      padding: 20px;
      border-top: 1px solid #27272a;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* Utilities */
    .empty-state {
      padding: 60px;
      text-align: center;
      border: 2px dashed #27272a;
      border-radius: 12px;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Hidden Uploader */
    #file-input {
      display: none;
    }

    /* A1111 Parameters Layout */
    .params-section {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px dashed rgba(255, 255, 255, 0.15);
    }
    .params-title {
      font-family: var(--font-title);
      font-size: 0.95rem;
      font-weight: 700;
      color: #a5b4fc;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    .params-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.5fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .params-grid {
        grid-template-columns: 1fr;
      }
    }
    .param-box {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .param-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .param-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      padding: 6px 10px;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .param-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-glow);
    }
    .param-input::placeholder {
      color: #475569;
    }
    .param-hint {
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 2px;
      line-height: 1.3;
    }
    .card-params-details {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px dashed rgba(255, 255, 255, 0.1);
    }
    .card-params-summary {
      cursor: pointer;
      font-size: 0.85rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      outline: none;
      transition: color 0.2s;
    }
    .card-params-summary:hover {
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <datalist id="samplers-list">
    <option value="Euler a"></option>
    <option value="Euler"></option>
    <option value="Heun"></option>
    <option value="DPM++ 2M Karras"></option>
    <option value="DPM++ SDE Karras"></option>
    <option value="DPM++ 2M SDE Karras"></option>
    <option value="DPM++ 2M SDE Exponential"></option>
    <option value="DPM++ 2S a Karras"></option>
    <option value="DDIM"></option>
    <option value="UniPC"></option>
  </datalist>

  <header>
    <div class="logo-container">
      <div class="logo-icon"><i data-lucide="sparkles" style="width:18px;height:18px"></i></div>
      <div class="logo-text">Prompt Set Editor</div>
    </div>
    <div class="header-actions">
      <div style="display: flex; align-items: center; background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 4px 10px; margin-right: 12px;">
        <span style="font-size: 0.8rem; color: #94a3b8; font-weight: 600;">🌐 A1111 API:</span>
        <input type="text" id="api-url-input" style="background: transparent; border: none; outline: none; color: #fff; font-size: 0.8rem; margin-left: 6px; width: 160px;" placeholder="http://127.0.0.1:7860" value="http://127.0.0.1:7860" onchange="updateApiUrl(this.value)">
        <span class="api-status-dot" id="api-conn-dot" title="連線狀態"></span>
      </div>
      <button class="btn btn-primary" onclick="generateAllActiveBlocks()"><i data-lucide="zap" style="width:16px;height:16px"></i>⚡ 批次生成</button>
      <button class="btn" onclick="triggerImport()"><i data-lucide="upload" style="width:16px;height:16px"></i>匯入 JSON</button>
      <button class="btn" onclick="exportWorkspace()"><i data-lucide="download" style="width:16px;height:16px"></i>匯出 JSON</button>
      <button class="btn btn-primary" onclick="openExportModal()"><i data-lucide="file-text" style="width:16px;height:16px"></i>A1111 批次匯出 (Convert)</button>
    </div>
  </header>

  <main>
    <input type="file" id="file-input" accept=".json" onchange="importWorkspace(event)">

    <!-- 全域控制面板 -->
    <section class="control-panel">
      <div class="control-row">
        <div class="control-label"><i data-lucide="folder" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"></i>全域卡片摺疊：</div>
        <div class="pills-container">
          <button class="pill-btn" onclick="setAllBlocksCollapsed(false)">展開所有卡片</button>
          <button class="pill-btn" onclick="setAllBlocksCollapsed(true)">收合所有卡片</button>
        </div>
      </div>
      <div class="control-row">
        <div class="control-label"><i data-lucide="sliders" style="width:14px;height:14px;vertical-align:middle;margin-right:6px"></i>跨卡片比對分類：</div>
        <div class="pills-container" id="compare-pills">
          <button class="pill-btn active" id="compare-all-btn" onclick="setCompareCategory(null)">顯示全部分類</button>
          <!-- Category comparative pills rendered dynamically -->
        </div>
      </div>
    </section>

    <!-- Common Prompt -->
    <section class="common-prompt-container" id="common-prompt-card">
      <!-- Rendered dynamically -->
    </section>

    <!-- Prompt Cards -->
    <section class="prompt-cards-container" id="prompt-cards-root">
      <!-- Rendered dynamically -->
    </section>

    <div style="margin-top: 24px; display: flex; justify-content: center;">
      <button class="btn btn-primary" style="padding: 12px 24px;" onclick="addBlock()">
        <i data-lucide="plus" style="width:18px;height:18px"></i>新增 Prompt 卡片 (Block)
      </button>
    </div>
  </main>

  <!-- Export Batch Modal -->
  <div class="modal-overlay" id="export-modal" onclick="closeExportModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="modal-title">A1111 批次匯出 (一行一組 Prompt)</h3>
        <button class="btn-icon-sm" onclick="closeExportModal()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body">
        <textarea class="modal-textarea" id="export-textarea" readonly></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="copyBatchText()"><i data-lucide="copy" style="width:16px;height:16px"></i>複製全部</button>
        <button class="btn btn-primary" onclick="downloadBatchFile()"><i data-lucide="download" style="width:16px;height:16px"></i>下載 .txt 檔案</button>
        <button class="btn" onclick="closeExportModal()">關閉</button>
      </div>
    </div>
  </div>

  <!-- Lightbox Modal -->
  <div class="modal-overlay" id="lightbox-modal" onclick="closeLightbox()">
    <div class="modal-box" onclick="event.stopPropagation()" style="max-width: 900px; max-height: 85vh;">
      <div class="modal-header">
        <h3 class="modal-title">🖼️ 歷史生成圖片與參數快照</h3>
        <button class="btn-icon-sm" onclick="closeLightbox()"><i data-lucide="x"></i></button>
      </div>
      <div class="modal-body" style="display: flex; gap: 20px; flex-wrap: wrap; overflow-y: auto;">
        <!-- Left Column: Image Display -->
        <div style="flex: 1 1 400px; display: flex; align-items: center; justify-content: center; background: #09090b; border-radius: 8px; overflow: hidden; border: 1px solid #27272a; min-height: 350px;">
          <img id="lightbox-img" style="max-width: 100%; max-height: 50vh; object-fit: contain;" src="" alt="Generated Image">
        </div>
        <!-- Right Column: Settings and Metadata -->
        <div style="flex: 1 1 350px; display: flex; flex-direction: column; gap: 12px; min-width: 300px;">
          <div style="display: flex; justify-content: space-between; font-size: 0.85rem; border-bottom: 1px dashed #27272a; padding-bottom: 8px;">
            <div><span style="color: var(--text-muted);">時間：</span><span id="lightbox-time" style="color: #e2e8f0; font-weight: 500;"></span></div>
            <div><span style="color: var(--text-muted);">解析度：</span><span id="lightbox-resolution" style="color: #e2e8f0; font-weight: 500;"></span></div>
          </div>
          <div>
            <span style="display: block; font-size: 0.85rem; font-weight: 600; color: #e2e8f0; margin-bottom: 6px;">⚙️ A1111 參數：</span>
            <pre id="lightbox-params" style="margin: 0; background: #09090b; border: 1px solid #27272a; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.8rem; color: #10b981; white-space: pre-wrap; word-break: break-all;"></pre>
          </div>
          <div>
            <span style="display: block; font-size: 0.85rem; font-weight: 600; color: #e2e8f0; margin-bottom: 6px;">✨ 分類 Prompts：</span>
            <div id="lightbox-categories" style="display: flex; flex-direction: column; gap: 6px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; padding: 10px; font-size: 0.8rem; overflow-y: auto; max-height: 200px;"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="lightbox-restore-btn" class="btn btn-primary"><i data-lucide="refresh-cw" style="width:16px;height:16px"></i>🔄 套用設定到此卡片</button>
        <button id="lightbox-download-btn" class="btn"><i data-lucide="download" style="width:16px;height:16px"></i>💾 下載圖片</button>
        <button class="btn" onclick="closeLightbox()">關閉</button>
      </div>
    </div>
  </div>

  <script>
    // Categories and metadata
    const CATEGORIES = {
      quality: { label: '品質詞', emoji: '✨' },
      style: { label: '風格, 繪師名稱', emoji: '🎨' },
      character: { label: '角色名稱', emoji: '👤' },
      face: { label: '臉部特徵: 髮色髮飾, 曈色, 表情, etc', emoji: '👁️' },
      body: { label: '身體特徵: 胸部, 腰, 屁股, 大腿, 腳, etc', emoji: '💪' },
      clothes: { label: '衣服', emoji: '👗' },
      faceAction: { label: '臉部動作', emoji: '👀' },
      bodyAction: { label: '身體動作', emoji: '🤸' },
      background: { label: '背景, 鏡頭角度', emoji: '🌅' },
      lora: { label: 'lora', emoji: '💿' }
    };
    const CATEGORY_KEYS = Object.keys(CATEGORIES);

    // Initial state
    let state = {
      apiUrl: 'http://127.0.0.1:7860',
      commonPrompt: {
        quality: '', style: '', character: '', face: '', body: '', clothes: '', faceAction: '', bodyAction: '', background: '', lora: ''
      },
      commonParams: {
        negativePrompt: '',
        steps: '',
        cfgScale: '',
        samplerName: '',
        seed: ''
      },
      blocks: [],
      activeCompareCategory: null
    };

    // IndexedDB Database Manager
    let dbInstance = null;
    function initDB() {
      return new Promise((resolve, reject) => {
        if (dbInstance) return resolve(dbInstance);
        if (typeof indexedDB === 'undefined') {
          return reject(new Error('IndexedDB is not supported'));
        }
        const request = indexedDB.open('PromptSetEditorDB', 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains('images')) {
            db.createObjectStore('images', { keyPath: 'id' });
          }
        };
        request.onsuccess = (e) => {
          dbInstance = e.target.result;
          resolve(dbInstance);
        };
        request.onerror = (e) => reject(e.target.error);
      });
    }

    function getImagesForBlock(blockId) {
      return initDB().then(db => new Promise((resolve, reject) => {
        const transaction = db.transaction('images', 'readonly');
        const store = transaction.objectStore('images');
        const cursorRequest = store.openCursor();
        const results = [];
        cursorRequest.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            if (cursor.value.blockId === blockId) {
              results.push(cursor.value);
            }
            cursor.continue();
          } else {
            results.sort((a, b) => a.timestamp - b.timestamp);
            resolve(results);
          }
        };
        cursorRequest.onerror = (e) => reject(e.target.error);
      }));
    }

    function saveImageToHistory(blockId, base64Data, paramsSnapshot) {
      return initDB().then(db => new Promise((resolve, reject) => {
        const transaction = db.transaction('images', 'readwrite');
        const store = transaction.objectStore('images');
        const timestamp = Date.now();
        const id = `${blockId}_${timestamp}`;
        store.put({ id, blockId, timestamp, base64Data, paramsSnapshot });
        transaction.oncomplete = () => {
          getImagesForBlock(blockId).then(images => {
            if (images.length > 10) {
              const db2 = dbInstance;
              const tx2 = db2.transaction('images', 'readwrite');
              const store2 = tx2.objectStore('images');
              const deleteCount = images.length - 10;
              for (let i = 0; i < deleteCount; i++) {
                store2.delete(images[i].id);
              }
              tx2.oncomplete = () => resolve();
              tx2.onerror = (e) => reject(e.target.error);
            } else {
              resolve();
            }
          }).catch(reject);
        };
        transaction.onerror = (e) => reject(e.target.error);
      }));
    }

    function deleteImagesForBlock(blockId) {
      return initDB().then(db => new Promise((resolve, reject) => {
        const transaction = db.transaction('images', 'readwrite');
        const store = transaction.objectStore('images');
        const cursorRequest = store.openCursor();
        cursorRequest.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            if (cursor.value.blockId === blockId) {
              store.delete(cursor.key);
            }
            cursor.continue();
          } else {
            resolve();
          }
        };
        cursorRequest.onerror = (e) => reject(e.target.error);
      }));
    }

    function cleanOrphanedImages() {
      return initDB().then(db => new Promise((resolve, reject) => {
        const transaction = db.transaction('images', 'readwrite');
        const store = transaction.objectStore('images');
        const cursorRequest = store.openCursor();
        const validBlockIds = new Set(state.blocks.map(b => b.id));
        cursorRequest.onsuccess = (e) => {
          const cursor = e.target.result;
          if (cursor) {
            if (!validBlockIds.has(cursor.value.blockId)) {
              store.delete(cursor.key);
            }
            cursor.continue();
          } else {
            resolve();
          }
        };
        cursorRequest.onerror = (e) => reject(e.target.error);
      }));
    }

    // Load state from localStorage on startup
    function loadState() {
      try {
        const stored = localStorage.getItem('prompt_set_editor_state');
        if (stored) {
          const parsed = JSON.parse(stored);
          if (validateWorkspaceSchema(parsed)) {
            for (const key in state) {
              delete state[key];
            }
            Object.assign(state, parsed);
            
            // Migration: load state.apiUrl or use default
            if (state.apiUrl === undefined) {
              state.apiUrl = 'http://127.0.0.1:7860';
            }
            
            // Migration: split action category into faceAction/bodyAction
            if (state.commonPrompt.action !== undefined) {
              state.commonPrompt.bodyAction = state.commonPrompt.action;
              state.commonPrompt.faceAction = '';
              delete state.commonPrompt.action;
            }
            
            // Normalize categories to ensure new keys (like lora, faceAction, bodyAction) exist
            if (!state.commonPrompt.collapsedCategories) {
              state.commonPrompt.collapsedCategories = {};
            }
            for (const key of CATEGORY_KEYS) {
              if (state.commonPrompt[key] === undefined) {
                state.commonPrompt[key] = '';
              }
            }

            // Initialize commonParams if undefined
            if (!state.commonParams) {
              state.commonParams = {
                negativePrompt: '',
                steps: '',
                cfgScale: '',
                samplerName: '',
                seed: ''
              };
            } else {
              const paramKeys = ['negativePrompt', 'steps', 'cfgScale', 'samplerName', 'seed'];
              paramKeys.forEach(k => {
                if (state.commonParams[k] === undefined) state.commonParams[k] = '';
              });
            }

            state.blocks.forEach(block => {
              if (!block.collapsedCategories) {
                block.collapsedCategories = {};
              }
              if (!block.categories) {
                block.categories = {};
              }
              if (block.resolution === undefined) {
                block.resolution = '';
              }
              
              // Block-level migration for action key
              if (block.categories.action !== undefined) {
                block.categories.bodyAction = block.categories.action;
                block.categories.faceAction = '';
                delete block.categories.action;
              }
              
              for (const key of CATEGORY_KEYS) {
                if (block.categories[key] === undefined) {
                  block.categories[key] = '';
                }
              }

              // Initialize block params if undefined
              if (!block.params) {
                block.params = {
                  negativePrompt: '',
                  steps: '',
                  cfgScale: '',
                  samplerName: '',
                  seed: ''
                };
              } else {
                const paramKeys = ['negativePrompt', 'steps', 'cfgScale', 'samplerName', 'seed'];
                paramKeys.forEach(k => {
                  if (block.params[k] === undefined) block.params[k] = '';
                });
              }
            });
          }
        }
      } catch (e) {
        console.error('Failed to load state:', e);
      }
      
      // Scaffolding a default block if empty
      if (state.blocks.length === 0) {
        state.blocks.push({
          id: generateId(),
          name: 'Block #1',
          isCollapsed: false,
          collapsedCategories: {},
          resolution: '',
          categories: {
            quality: '', style: '', character: '', face: '', body: '', clothes: '', faceAction: '', bodyAction: '', background: '', lora: ''
          },
          params: {
            negativePrompt: '',
            steps: '',
            cfgScale: '',
            samplerName: '',
            seed: ''
          }
        });
      }
      cleanOrphanedImages().catch(e => console.error('Pruning failed:', e));
      
      // Update DOM with loaded API URL
      const apiInput = document.getElementById('api-url-input');
      if (apiInput) {
        apiInput.value = state.apiUrl || 'http://127.0.0.1:7860';
      }
    }

    function saveState() {
      localStorage.setItem('prompt_set_editor_state', JSON.stringify(state));
    }

    function generateId() {
      return 'id-' + Math.random().toString(36).substr(2, 9) + '-' + Date.now().toString(36);
    }

    function updateApiUrl(val) {
      state.apiUrl = val.trim();
      saveState();
      pingAPI();
    }

    function pingAPI() {
      const url = state.apiUrl || 'http://127.0.0.1:7860';
      const dot = document.getElementById('api-conn-dot');
      if (!dot) return Promise.resolve(); // Safe fallback for mocked test environment
      return fetch(`${url}/sdapi/v1/sd-models`, { method: 'GET' })
        .then(res => {
          if (res.ok) {
            dot.className = 'api-status-dot online';
            dot.title = '已連線到 A1111';
          } else {
            dot.className = 'api-status-dot';
            dot.title = '連線異常';
          }
        })
        .catch(() => {
          dot.className = 'api-status-dot';
          dot.title = '未連線 (離線)';
        });
    }

    let generationQueue = [];
    let isGenerating = false;

    function generateAllActiveBlocks() {
      if (state.blocks.length === 0) return;
      state.blocks.forEach(b => {
        enqueueGeneration(b.id);
      });
    }

    function enqueueGeneration(blockId, isDraft = false) {
      if (generationQueue.some(item => item.blockId === blockId && item.isDraft === isDraft)) return;
      generationQueue.push({ blockId, isDraft });
      processQueue();
    }

    function processQueue() {
      if (isGenerating || generationQueue.length === 0) return;
      isGenerating = true;
      const nextItem = generationQueue.shift();
      triggerBlockGeneration(nextItem.blockId, nextItem.isDraft)
        .finally(() => {
          isGenerating = false;
          processQueue();
        });
    }

    function triggerBlockGeneration(blockId, isDraft = false) {
      if (window.triggerBlockGenerationOverride) {
        return window.triggerBlockGenerationOverride(blockId);
      }
      const block = state.blocks.find(b => b.id === blockId);
      if (!block) return Promise.resolve();

      const btnGen = document.getElementById(`btn-gen-${blockId}`);
      const btnDraft = document.getElementById(`btn-draft-${blockId}`);
      const btn = isDraft && btnDraft ? btnDraft : btnGen;
      const originalHTML = btn ? btn.innerHTML : '';
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = `<i class="spinner-icon"></i>⏳ 生成中...`;
      }

      // Compile payload
      let positive = compilePrompt(block, state.commonPrompt, ', ');
      if (isDraft) {
        positive += ', <lora:sdxl_lightning_8step_lora:1>';
      }
      
      // Negative Prompt
      const blockNeg = stripComments((block.params?.negativePrompt || '').trim());
      const commonNeg = stripComments((state.commonParams?.negativePrompt || '').trim());
      let finalNeg = '';
      if (blockNeg.startsWith('=')) {
        finalNeg = blockNeg.slice(1).trim();
      } else if (commonNeg && blockNeg) {
        finalNeg = commonNeg + ', ' + blockNeg;
      } else {
        finalNeg = commonNeg || blockNeg;
      }

      // Resolving numeric/sampler options
      const resolveParam = (bVal, cVal, defaultVal) => {
        const bv = (bVal || '').trim();
        const cv = (cVal || '').trim();
        let v = '';
        if (bv.startsWith('=')) {
          v = bv.slice(1).trim();
        } else {
          v = bv || cv;
        }
        return v || defaultVal;
      };

      let steps = parseInt(resolveParam(block.params?.steps, state.commonParams?.steps, '20'), 10);
      let cfg = parseFloat(resolveParam(block.params?.cfgScale, state.commonParams?.cfgScale, '7.0'));
      const sampler = resolveParam(block.params?.samplerName, state.commonParams?.samplerName, 'Euler a');

      if (isDraft) {
        steps = 8;
        cfg = 1;
      }
      const seed = parseInt(resolveParam(block.params?.seed, state.commonParams?.seed, '-1'), 10);

      let width = 1024;
      let height = 1024;
      if (block.resolution) {
        const [w, h] = block.resolution.split('x');
        width = parseInt(w, 10);
        height = parseInt(h, 10);
      }

      const payload = {
        prompt: positive,
        negative_prompt: finalNeg,
        steps: steps,
        cfg_scale: cfg,
        sampler_name: sampler,
        seed: seed,
        width: width,
        height: height,
        batch_size: 1
      };

      if (state.commonParams?.enableAdetailer !== false) {
        const adPrompt = compileADetailerPrompt(block, isDraft);
        payload.alwayson_scripts = {
          ADetailer: {
            args: [
              {
                ad_model: "face_yolov8n.pt",
                ad_prompt: adPrompt
              }
            ]
          }
        };
      }

      const url = state.apiUrl || 'http://127.0.0.1:7860';
      return fetch(`${url}/sdapi/v1/txt2img`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => {
        if (!res.ok) throw new Error('伺服器回傳錯誤');
        return res.json();
      })
      .then(data => {
        if (data.images && data.images.length > 0) {
          const base64 = 'data:image/png;base64,' + data.images[0];
          
          // Snapshot inputs
          const snapshot = {
            categories: { ...block.categories },
            params: { ...block.params },
            resolution: block.resolution || '',
            isDraft: isDraft
          };
          return saveImageToHistory(blockId, base64, snapshot).then(() => {
            loadAndRenderGallery(blockId);
            showToast('圖片生成成功！已加入歷史紀錄。');
          });
        }
      })
      .catch(err => {
        console.error('Generation failed:', err);
        alert(`產圖失敗！\n1. 請確認 A1111 已啟動並開啟 API。\n2. 啟動參數需包含 --cors-allow-origins=*\n詳細錯誤：${err.message}`);
      })
      .finally(() => {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = originalHTML;
        }
      });
    }

    function loadAndRenderGallery(blockId) {
      const thumbsContainer = document.getElementById(`thumbs-${blockId}`);
      const rowContainer = document.getElementById(`gallery-${blockId}`);
      if (!thumbsContainer) return;
      
      getImagesForBlock(blockId).then(images => {
        if (images.length === 0) {
          rowContainer.style.display = 'none';
          return;
        }
        rowContainer.style.display = 'block';
        thumbsContainer.innerHTML = '';
        images.forEach(img => {
          const imgEl = document.createElement('div');
          imgEl.style = 'width:64px; height:64px; background-size: cover; background-position: center; border-radius:4px; border:1px solid #475569; cursor:pointer; transition: transform 0.1s; position: relative;';
          imgEl.style.backgroundImage = `url(${img.base64Data})`;
          
          if (img.paramsSnapshot && img.paramsSnapshot.isDraft) {
            const badge = document.createElement('div');
            badge.innerText = '草稿';
            badge.style = 'position:absolute; bottom:2px; right:2px; background:rgba(99,102,241,0.9); color:white; font-size:10px; padding:2px 4px; border-radius:3px; line-height:1; pointer-events:none; font-weight:bold;';
            imgEl.appendChild(badge);
          }

          imgEl.onclick = () => openLightbox(img);
          imgEl.onmouseenter = () => { imgEl.style.transform = 'scale(1.05)'; };
          imgEl.onmouseleave = () => { imgEl.style.transform = 'scale(1)'; };
          thumbsContainer.appendChild(imgEl);
        });
      });
    }

    function openLightbox(img) {
      const modal = document.getElementById('lightbox-modal');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxTime = document.getElementById('lightbox-time');
      const lightboxResolution = document.getElementById('lightbox-resolution');
      const lightboxParams = document.getElementById('lightbox-params');
      const lightboxCategories = document.getElementById('lightbox-categories');

      if (!modal || !lightboxImg) return;

      lightboxImg.src = img.base64Data;
      const snap = img.paramsSnapshot || {};
      const draftText = snap.isDraft ? '<span style="color:#a855f7; font-weight:bold; margin-right:8px;">[草稿]</span>' : '';
      lightboxTime.innerHTML = draftText + new Date(img.timestamp).toLocaleString();
      
      lightboxResolution.innerText = snap.resolution || '未指定 (預設 1024x1024)';

      // Render params
      const params = snap.params || {};
      const paramsText = [
        `Steps: ${params.steps || ''}`,
        `CFG Scale: ${params.cfgScale || ''}`,
        `Sampler: ${params.samplerName || ''}`,
        `Seed: ${params.seed || ''}`,
        `Negative Prompt: ${params.negativePrompt || ''}`
      ].join('\n');
      lightboxParams.innerText = paramsText;

      // Render categories
      const cats = snap.categories || {};
      lightboxCategories.innerHTML = '';
      Object.keys(CATEGORIES).forEach(key => {
        const cat = CATEGORIES[key];
        const val = cats[key];
        if (val) {
          const item = document.createElement('div');
          item.style.marginBottom = '6px';
          item.innerHTML = `<span style="color: var(--text-muted); font-weight:600;">${cat.emoji} ${cat.label}：</span><span style="color: #f1f5f9;">${val}</span>`;
          lightboxCategories.appendChild(item);
        }
      });

      // Bind action buttons
      const restoreBtn = document.getElementById('lightbox-restore-btn');
      const downloadBtn = document.getElementById('lightbox-download-btn');
      if (restoreBtn) {
        restoreBtn.onclick = () => applySnapshotToBlock(img.blockId, img.paramsSnapshot);
      }
      if (downloadBtn) {
        downloadBtn.onclick = () => downloadImage(img.base64Data, `sd-gen-${img.blockId}-${img.timestamp}.png`);
      }

      modal.style.display = 'flex';
      lucide.createIcons();
    }

    function closeLightbox() {
      const modal = document.getElementById('lightbox-modal');
      if (modal) {
        modal.style.display = 'none';
      }
    }

    function applySnapshotToBlock(blockId, snapshot) {
      if (!snapshot) return;
      const block = state.blocks.find(b => b.id === blockId);
      if (!block) return;

      block.categories = JSON.parse(JSON.stringify(snapshot.categories || {}));
      block.params = JSON.parse(JSON.stringify(snapshot.params || {}));
      block.resolution = snapshot.resolution || '';

      saveState();
      renderEditor();
      closeLightbox();
      showToast('已成功還原生成設定到卡片！');
    }

    function downloadImage(base64Data, filename) {
      const a = document.createElement('a');
      a.href = base64Data;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function stripComments(text) {
      if (!text) return text;
      return text.replace(/\/\*[\s\S]*?\*\/|\/\/.*/g, '').trim();
    }

    function compilePrompt(block, commonPrompt, separator = ', ') {
      const parts = [];
      for (const key of CATEGORY_KEYS) {
        const commonVal = stripComments((commonPrompt[key] || '').trim());
        const blockVal = stripComments((block.categories[key] || '').trim());
        let merged = '';
        
        const trimmedBlockVal = blockVal.trim();
        if (trimmedBlockVal.startsWith('=')) {
          merged = trimmedBlockVal.slice(1).trim();
        } else if (commonVal && blockVal) {
          merged = commonVal + ', ' + blockVal;
        } else {
          merged = commonVal || blockVal;
        }
        
        if (merged) {
          parts.push(merged);
        }
      }
      return parts.join(separator);
    }

    function validateWorkspaceSchema(data) {
      if (!data || typeof data !== 'object') return false;
      if (!data.commonPrompt || typeof data.commonPrompt !== 'object') return false;
      if (!Array.isArray(data.blocks)) return false;
      return true;
    }

    // App core handlers
    function addBlock() {
      const newBlock = {
        id: generateId(),
        name: `Block #${state.blocks.length + 1}`,
        isCollapsed: false,
        collapsedCategories: {},
        resolution: '',
        categories: {
          quality: '', style: '', character: '', face: '', body: '', clothes: '', faceAction: '', bodyAction: '', background: '', lora: ''
        },
        params: {
          negativePrompt: '',
          steps: '',
          cfgScale: '',
          samplerName: '',
          seed: ''
        }
      };
      state.blocks.push(newBlock);
      saveState();
      renderEditor();
    }

    function cloneBlock(id) {
      const idx = state.blocks.findIndex(b => b.id === id);
      if (idx === -1) return;
      const original = state.blocks[idx];
      const clone = {
        id: generateId(),
        name: `${original.name} (Copy)`,
        isCollapsed: original.isCollapsed,
        collapsedCategories: { ...original.collapsedCategories },
        resolution: original.resolution || '',
        categories: { ...original.categories },
        params: original.params ? { ...original.params } : {
          negativePrompt: '',
          steps: '',
          cfgScale: '',
          samplerName: '',
          seed: ''
        }
      };
      state.blocks.splice(idx + 1, 0, clone);
      saveState();
      renderEditor();
    }

    function deleteBlock(id) {
      if (state.blocks.length <= 1) {
        alert('請至少保留一個 Prompt 卡片！');
        return;
      }
      if (!confirm('確定要刪除此 Prompt 卡片嗎？')) return;
      state.blocks = state.blocks.filter(b => b.id !== id);
      saveState();
      renderEditor();
      deleteImagesForBlock(id).catch(e => console.error('Deletion failed:', e));
    }

    function updateCommonField(key, value) {
      state.commonPrompt[key] = value;
      saveState();
      updatePreviews();
    }

    function updateBlockField(id, key, value) {
      const block = state.blocks.find(b => b.id === id);
      if (block) {
        block.categories[key] = value;
        saveState();
        updatePreviews();
      }
    }

    function updateBlockName(id, value) {
      const block = state.blocks.find(b => b.id === id);
      if (block) {
        block.name = value;
        saveState();
      }
    }

    // Interactive collapse controls
    function setAllBlocksCollapsed(collapsed) {
      for (const block of state.blocks) {
        block.isCollapsed = collapsed;
      }
      saveState();
      renderEditor();
    }

    function toggleBlockCollapsed(id) {
      const block = state.blocks.find(b => b.id === id);
      if (block) {
        block.isCollapsed = !block.isCollapsed;
        saveState();
        renderEditor();
      }
    }

    function toggleCategoryCollapse(blockId, key) {
      if (blockId === 'common') {
        const isCollapsed = !state.commonPrompt.collapsedCategories?.[key];
        if (!state.commonPrompt.collapsedCategories) {
          state.commonPrompt.collapsedCategories = {};
        }
        state.commonPrompt.collapsedCategories[key] = isCollapsed;
      } else {
        const block = state.blocks.find(b => b.id === blockId);
        if (block) {
          const isCollapsed = !block.collapsedCategories[key];
          block.collapsedCategories[key] = isCollapsed;
        }
      }
      saveState();
      renderEditor();
    }

    function toggleAllCategoriesInBlock(id, collapse) {
      if (id === 'common') {
        if (!state.commonPrompt.collapsedCategories) {
          state.commonPrompt.collapsedCategories = {};
        }
        for (const key of CATEGORY_KEYS) {

      } else {

        if (block) {

      let toast = document.getElementById('toast-notification');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast-notification';
        toast.style.cssText = `
          position: fixed;
          bottom: 32px;
          left: 50%;
          transform: translateX(-50%) translateY(20px);
          background: rgba(16, 185, 129, 0.95);
          border: 1px solid rgba(255, 255, 255, 0.05);
          color: white;

      }, 10);
      
      // Auto fade out
      if (toastTimeoutId) {
        clearTimeout(toastTimeoutId);

      toastTimeoutId = setTimeout(() => {
        toast.style.transform = 'translateX(-50%) translateY(20px)';
        toast.style.opacity = '0';

    // Copy compiler
    function copyBlockCompiledText(id) {
      const block = state.blocks.find(b => b.id === id);
      if (block) {
        const text = compilePrompt(block, state.commonPrompt, '\n\n');
        navigator.clipboard.writeText(text)

          .catch(e => console.error('Copy failed:', e));

    // Compile ADetailer (Face Detailer) format
    function compileADetailerPrompt(block, isDraft = false) {
      const keys = ['quality', 'style', 'face', 'faceAction', 'bodyAction', 'lora'];
      const parts = [];
      for (const key of keys) {
        const commonVal = stripComments((state.commonPrompt[key] || '').trim());
        const blockVal = stripComments((block.categories[key] || '').trim());
        let merged = '';
        if (blockVal.startsWith('=')) {
          merged = blockVal.slice(1).trim();
        } else if (commonVal && blockVal) {
          merged = commonVal + ', ' + blockVal;
        } else {
          merged = commonVal || blockVal;
        }
        if (merged) {
          parts.push(merged);
        }
      }
      let text = parts.join(', ');
      if (isDraft) {
        text += ', <lora:sdxl_lightning_8step_lora:1>';
      }
      return text;
    }

    // Copy ADetailer (Face Detailer) format
    function copyBlockADetailerText(id) {
      const block = state.blocks.find(b => b.id === id);
      if (block) {
        const text = compileADetailerPrompt(block);
        navigator.clipboard.writeText(text)
          .then(() => showToast('已成功複製 Face Detailer Prompt 到剪貼簿！'))
          .catch(e => console.error('Copy failed:', e));
      }
    }

    function getResolutionFlags(res) {
      if (!res) return '';
      const [w, h] = res.split('x');
      return ` --width ${w} --height ${h}`;

      const block = state.blocks.find(b => b.id === id);

    function updateCommonParam(key, value) {
      if (!state.commonParams) {
        state.commonParams = {};

      state.commonParams[key] = value;
      saveState();

    function updateBlockParam(id, key, value) {
      const block = state.blocks.find(b => b.id === id);
      if (block) {
        if (!block.params) {
          block.params = {};

    // Modal view trigger
    function openExportModal() {
      const lines = state.blocks.map(b => {
        let prompt = compilePrompt(b, state.commonPrompt, ', ');
        
        // Compile A1111 textbox format parameters
        // 1. Negative Prompt (merge or override based on = prefix)
        const blockNeg = (b.params?.negativePrompt || '').trim();
        const commonNeg = (state.commonParams?.negativePrompt || '').trim();
        let finalNeg = '';
        if (blockNeg.startsWith('=')) {
          finalNeg = blockNeg.slice(1).trim();
        } else if (commonNeg && blockNeg) {
          finalNeg = commonNeg + ', ' + blockNeg;
        } else {
          finalNeg = commonNeg || blockNeg;
        }
        if (finalNeg) {
          prompt += ` --negative_prompt "${finalNeg}"`;
        }

        // Helper to compile overwrite-based simple parameters (Steps, CFG Scale, Sampler, Seed)
        const compileParam = (flagName, blockVal, commonVal, isString = false) => {
          const bVal = (blockVal || '').trim();
          const cVal = (commonVal || '').trim();
          let val = '';
          if (bVal.startsWith('=')) {
            val = bVal.slice(1).trim();
          } else {
            val = bVal || cVal;
          }
          if (val) {
            return isString ? ` --${flagName} "${val}"` : ` --${flagName} ${val}`;
          }
          return '';
        };

        prompt += compileParam('steps', b.params?.steps, state.commonParams?.steps);
        prompt += compileParam('cfg_scale', b.params?.cfgScale, state.commonParams?.cfgScale);
        prompt += compileParam('sampler_name', b.params?.samplerName, state.commonParams?.samplerName, true);
        prompt += compileParam('seed', b.params?.seed, state.commonParams?.seed);

        if (b.resolution) {
          prompt += getResolutionFlags(b.resolution);
        }
        return prompt;
      });
      document.getElementById('export-textarea').value = lines.join('\n');
      document.getElementById('export-modal').style.display = 'flex';
    }

    function downloadBatchFile() {
      const txt = document.getElementById('export-textarea').value;
      const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;

    // Import / Export JSON State Workspace
    function triggerImport() {
      document.getElementById('file-input').click();
    }

    function importWorkspace(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const parsed = JSON.parse(e.target.result);
          if (validateWorkspaceSchema(parsed)) {
            for (const key in state) {
              delete state[key];
            }
            Object.assign(state, parsed);
            
            // Ensure apiUrl is migrated after import
            if (state.apiUrl === undefined) {
              state.apiUrl = 'http://127.0.0.1:7860';
            }
            const apiInput = document.getElementById('api-url-input');
            if (apiInput) {
              apiInput.value = state.apiUrl;
            }
            pingAPI();

            saveState();
            renderEditor();
            cleanOrphanedImages().catch(e => console.error('Pruning failed:', e));
            alert('工作區匯入成功！');
          } else {
            alert('無效的工作區檔案結構！');
          }
        } catch (err) {
          alert('解析 JSON 檔案時發生錯誤：' + err.message);
        }
      };
      reader.readAsText(file);
      event.target.value = ''; // Reset uploader input
    }

    function exportWorkspace() {
      const txt = JSON.stringify(state, null, 2);
      const blob = new Blob([txt], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'prompt-set-workspace.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

                    oninput="updateBlockParam('${block.id}', 'samplerName', this.value)"
                  >
                  <span class="param-hint">未加 = 則覆寫，留空繼承</span>
                </div>
                <div class="param-box">
                  <label class="param-label" title="隨機種子">🎲 Seed</label>
                  <input type="text" class="param-input" 
                    placeholder="例如：=12345..."
                    value="${block.params?.seed || ''}"
                    oninput="updateBlockParam('${block.id}', 'seed', this.value)"
                  >
                  <span class="param-hint">未加 = 則覆寫，留空繼承</span>
                </div>
              </div>
            </details>
            <div class="card-gallery-row" id="gallery-${block.id}" style="margin-top: 12px; padding-top: 8px; border-top: 1px dashed rgba(255, 255, 255, 0.1); display: none;">
              <div style="font-size: 0.75rem; color: #64748b; margin-bottom: 6px;">🖼️ 歷史生成圖片 (點擊放大)：</div>
              <div class="gallery-thumbs" id="thumbs-${block.id}" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
            </div>
          ` : ''}
        `;

        cardsRoot.appendChild(card);
        if (!isCardCollapsed) {
          loadAndRenderGallery(block.id);
        }
      });

      // Refresh icons
      lucide.createIcons();
      // Initialize drag and drop sorting
      initDragAndDrop();
    }

    let sortableInstance = null;
    function initDragAndDrop() {
      const el = document.getElementById('prompt-cards-root');
      if (!el) return;
      if (sortableInstance) {
        sortableInstance.destroy();
      }
      // Handle potential offline fallback
      if (typeof Sortable === 'undefined') {
        console.warn('SortableJS is not loaded. Drag and drop sorting is disabled.');
        return;
      }
      sortableInstance = new Sortable(el, {
        handle: '.card-drag-handle',
        animation: 150,
        onEnd: function (evt) {
          const movedBlock = state.blocks.splice(evt.oldIndex, 1)[0];
          state.blocks.splice(evt.newIndex, 0, movedBlock);
          saveState();
          renderEditor();
        }
      });
    }

    // App Startup
    document.addEventListener('DOMContentLoaded', () => {
      loadState();
      renderEditor();
      pingAPI();
    });
  </script>
</body>
</html>
